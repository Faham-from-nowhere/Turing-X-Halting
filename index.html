<!DOCTYPE html>
<html>
<head>
    <title>IIIT Sri City Rant Zone</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }

        section {
            padding: 20px;
            margin: 20px;
            background: white;
            border-radius: 8px;
        }

        .rant-box {
            border: 1px solid #ddd;
            padding: 15px;
            margin-top: 15px;
            background-color: #fafafa;
            border-radius: 6px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .submit-btn {
            background-color: #ff4d4d;
            color: white;
        }

        .submit-btn:hover {
            background-color: #e60000;
        }

        .like-btn {
            background-color: #4CAF50;
            color: white;
            margin-right: 5px;
        }

        .delete-btn {
            background-color: #333;
            color: white;
        }

        .action-buttons {
            margin-top: 10px;
        }

        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>IIIT Sri City Rant Zone</h1>
    <p>Because sometimes... you just need to vent.</p>
</header>

<section>
    <h2>Submit Your Rant</h2>

<form id="rantForm">

    <label>Your Name</label>
    <input 
        type="text" 
        id="name"
        name="name"
        placeholder="Enter your full name"
        required
        minlength="3"
        maxlength="50"
        pattern="[A-Za-z ]+"
        title="Name should contain only letters and spaces (min 3 characters)"
    >

    <label>Email</label>
    <input 
        type="email" 
        id="email"
        name="email"
        placeholder="example@iiits.in"
        required
        maxlength="100"
    >

    <label>Roll Number</label>
    <input 
        type="text"
        id="roll"
        name="roll"
        placeholder="CSE101"
        required
        pattern="[A-Za-z0-9]+"
        minlength="3"
        maxlength="15"
        title="Roll number must contain only letters and numbers"
    >

    <label>Phone Number</label>
    <input 
        type="tel"
        id="phone"
        name="phone"
        placeholder="10 digit number"
        required
        pattern="[0-9]{10}"
        title="Enter a valid 10-digit phone number"
    >

    <label>Your Rant</label>
    <textarea 
        id="rantText"
        name="rantText"
        rows="4"
        placeholder="Vent responsibly..."
        required
        minlength="10"
        maxlength="300"
        title="Rant must be at least 10 characters long"
    ></textarea>

    <button type="submit" class="submit-btn">Rant Now</button>
</form>


    <div id="rantDisplay"></div>
</section>

<footer>
    © 2026 IIIT Sri City Rant Zone | Built for chaos 😌
</footer>

<script>
    const form = document.getElementById("rantForm");
    const rantDisplay = document.getElementById("rantDisplay");

    let rants = JSON.parse(localStorage.getItem("rants"));

    // 🔥 Default Banger Rants (only if no data exists)
    if (!rants) {
        rants = [
            {
                name: "Sleep Deprived CSE",
                email: "sleep@iiit.ac.in",
                roll: "CSE101",
                phone: "9999999999",
                text: "Why does WiFi become philosophical and disappear exactly when I click 'Submit Assignment'?",
                likes: 12
            },
            {
                name: "Mess Survivor",
                email: "paneer@again.com",
                roll: "CSE202",
                phone: "8888888888",
                text: "Paneer in breakfast. Paneer in lunch. Paneer in dinner. I am slowly becoming paneer.",
                likes: 25
            },
            {
                name: "Midsem Victim",
                email: "ripgrades@iiit.ac.in",
                roll: "CSE303",
                phone: "7777777777",
                text: "Midsem. Endsem. Surprise test. Lab evaluation. Group project. Sleep left the chat.",
                likes: 31
            },
            {
                name: "Hostel Furnace Resident",
                email: "melted@iiit.ac.in",
                roll: "CSE404",
                phone: "6666666666",
                text: "Room temperature: 42°C. Fan speed: Emotional support mode.",
                likes: 19
            }
        ];

        localStorage.setItem("rants", JSON.stringify(rants));
    }

    function saveToLocalStorage() {
        localStorage.setItem("rants", JSON.stringify(rants));
    }

    function renderRants() {
        rantDisplay.innerHTML = "";

        rants.forEach((rant, index) => {
            const rantDiv = document.createElement("div");
            rantDiv.classList.add("rant-box");

            rantDiv.innerHTML = `
                <strong>${rant.name}</strong><br>
                📧 ${rant.email}<br>
                🎓 Roll: ${rant.roll}<br>
                📱 ${rant.phone}
                <p>${rant.text}</p>

                <div class="action-buttons">
                    <button class="like-btn" onclick="likeRant(${index})">
                        👍 Like (${rant.likes})
                    </button>
                    <button class="delete-btn" onclick="deleteRant(${index})">
                        🗑 Delete
                    </button>
                </div>
            `;

            rantDisplay.appendChild(rantDiv);
        });
    }

    function likeRant(index) {
        rants[index].likes++;
        saveToLocalStorage();
        renderRants();
    }

    function deleteRant(index) {
        rants.splice(index, 1);
        saveToLocalStorage();
        renderRants();
    }

    form.addEventListener("submit", function(event) {
        event.preventDefault();

        const newRant = {
            name: document.getElementById("name").value.trim(),
            email: document.getElementById("email").value.trim(),
            roll: document.getElementById("roll").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            text: document.getElementById("rantText").value.trim(),
            likes: 0
        };

        rants.unshift(newRant);
        saveToLocalStorage();
        renderRants();
        form.reset();
    });

    renderRants();
</script>

</body>
</html>
